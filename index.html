<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteprov</title>

<style>

/* POZADINA */
body{
  background:#cfe8ff;
  font-family:Arial;
  padding:20px;
}

/* STRANICE */
.page{display:none;}
.active{display:block;}

h1,h2{text-align:center;}

/* CENTRIRANI BLOK TESTA */
#questions{
  max-width:700px;
  margin:0 auto;
}

/* ZADATAK */
.task{
  margin-bottom:45px;
  font-size:18px;
}

/* VELIKI REDNI BROJ */
.number{
  font-weight:bold;
  font-size:30px;
  margin-bottom:15px;
}

/* PODZADATAK */
.sub{
  margin-left:40px;
  margin-bottom:22px;
  display:flex;
  align-items:flex-start;
}

/* Oznaka a. b. c. */
.label{
  width:32px;
  font-weight:bold;
}

/* Tekst zadatka */
.text{
  margin-left:14px;
}

/* ODGOVOR */
.answer{
  margin-left:70px;
  margin-top:8px;
}

/* TEXTBOX */
input{
  width:120px;
  padding:8px;
  font-size:18px;
  text-align:center;
}

/* PRAVI RAZLOMAK */
.frac{
  display:inline-block;
  text-align:center;
  vertical-align:middle;
}

.frac span{
  display:block;
  padding:0 4px;
}

.frac .top{
  border-bottom:2px solid black;
}

/* Dugmad */
button{
  display:block;
  margin:20px auto;
  padding:12px 25px;
  font-size:18px;
}

</style>
</head>

<body>

<!-- STRANA 1 -->
<div id="page1" class="page active">
<h1>Matteprov</h1>
<button onclick="startTest()">Starta test</button>
</div>


<!-- STRANA 2 -->
<div id="page2" class="page">
<h2>Test</h2>

<form id="testForm">
<div id="questions"></div>
</form>

<button onclick="finishTest()">Avsluta test</button>

</div>


<!-- STRANA 3 -->
<div id="page3" class="page">
<h2>Resultat</h2>
<h1 id="score" style="text-align:center"></h1>

<button onclick="showTest()">Rätta test</button>
<button onclick="newTest()">Nytt test</button>

</div>



<script>

/* GLOBALNO */

let answers = {};

const names = [
"Stefan","Axmer","Filip","Vasko",
"Tadija","Tore","Tobias","Noah"
];

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function randomName(){
  return names[rand(0,names.length-1)];
}


/* PRAVI RAZLOMAK */

function frac(top,bottom){
  return `
  <span class="frac">
    <span class="top">${top}</span>
    <span>${bottom}</span>
  </span>`;
}


/* JEDNACINE */

function eqDivide1(id){

  let a=rand(2,10);
  let b=rand(2,10);
  let x=a*b;

  answers[id]=x;

  return `
  ${b} = x / ${a}
  <div class="answer">
    x = <input id="${id}" type="number">
  </div>`;
}


function eqDivide2(id){

  let x=rand(2,10);
  let b=rand(2,10);
  let c=b*x;

  answers[id]=x;

  return `
  ${b} = ${frac(c,"x")}
  <div class="answer">
    x = <input id="${id}" type="number">
  </div>`;
}


function eqMultiply(id){

  let a=rand(2,20);
  let x=rand(2,15);
  let b=a*x;

  answers[id]=x;

  return `
  ${a} · x = ${b}
  <div class="answer">
    x = <input id="${id}" type="number">
  </div>`;
}


/* TEKSTUALNI */

function wordDifference(id){

  let n1=randomName();
  let n2=randomName();

  let p1=rand(120,200);
  let p2=rand(100,180);

  let diff=Math.abs(p1-p2);

  answers[id]=diff;

  return `
  ${n1} köpte en tårta för ${p1} kr och
  ${n2} betalade ${p2} kr.
  Hur mycket dyrare var den första?

  <div class="answer">
    Svar: <input id="${id}" type="number">
  </div>`;
}


/* RANDOM ZADATAK */

function randomTask(id){

  let t=rand(1,4);

  if(t===1) return eqDivide1(id);
  if(t===2) return eqDivide2(id);
  if(t===3) return eqMultiply(id);

  return wordDifference(id);
}


/* GENERISI TEST */

function generateTest(){

  answers={};

  let html="";

  for(let q=1;q<=6;q++){

    html+=`
    <div class="task">
      <div class="number">${q}.</div>

      <div class="sub">
        <div class="label">a.</div>
        <div class="text">${randomTask("q"+q+"a")}</div>
      </div>

      <div class="sub">
        <div class="label">b.</div>
        <div class="text">${randomTask("q"+q+"b")}</div>
      </div>

      <div class="sub">
        <div class="label">c.</div>
        <div class="text">${randomTask("q"+q+"c")}</div>
      </div>

    </div>`;
  }

  document.getElementById("questions").innerHTML=html;
}


/* NAVIGACIJA */

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startTest(){
  generateTest();
  showPage("page2");
}

function showTest(){ showPage("page2"); }

function newTest(){
  document.getElementById("testForm").reset();
  showPage("page1");
}


/* OCENJIVANJE */

function finishTest(){

  let score=0;

  for(let id in answers){

    let value=document.getElementById(id).value;

    if(value==="") continue;

    if(Number(value)===answers[id]) score++;
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
