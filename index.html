<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteprov</title>

<style>

/* Pozadina svetlo plava */
body{
  background:#cfe8ff;
  font-family:Arial;
  padding:20px;
}

/* Stranice */
.page{display:none;}
.active{display:block;}

h1,h2{text-align:center;}

.task{
  margin-bottom:25px;
  font-size:18px;
}

/* Redni broj */
.number{
  font-weight:bold;
  margin-bottom:5px;
}

/* Podzadaci */
.sub{
  margin-left:20px;
  margin-bottom:8px;
}

/* Odgovor linija */
.answer{
  margin-left:40px;
}

/* Textbox */
input{
  width:90px;
  padding:6px;
  font-size:18px;
  text-align:center;
}

button{
  display:block;
  margin:20px auto;
  padding:12px 25px;
  font-size:18px;
}

</style>
</head>

<body>

<!-- STRANA 1 -->
<div id="page1" class="page active">

<h1>Matteprov</h1>

<button onclick="startTest()">Starta test</button>

</div>


<!-- STRANA 2 -->
<div id="page2" class="page">

<h2>Test</h2>

<form id="testForm">
<div id="questions"></div>
</form>

<button onclick="finishTest()">Avsluta test</button>

</div>


<!-- STRANA 3 -->
<div id="page3" class="page">

<h2>Resultat</h2>
<h1 id="score" style="text-align:center"></h1>

<button onclick="showTest()">Rätta test</button>
<button onclick="newTest()">Nytt test</button>

</div>



<script>

/* =========================
   GLOBALNO
========================= */

let answers = {};

const names = [
"Stefan","Axmer","Filip","Vasko",
"Tadija","Tore","Tobias","Noah"
];

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function randomName(){
  return names[rand(0,names.length-1)];
}


/* =========================
   JEDNACINE
========================= */

function eqDivide1(id){

  let a=rand(2,10);
  let b=rand(2,10);
  let x=a*b;

  answers[id]=x;

  return `
  ${b} = x / ${a}
  <div class="answer">
    x = ? <br>
    <input id="${id}" type="number">
  </div>`;
}


function eqDivide2(id){

  let x=rand(2,10);
  let b=rand(2,10);
  let c=b*x;

  answers[id]=x;

  return `
  ${b} = ${c} / x
  <div class="answer">
    x = ? <br>
    <input id="${id}" type="number">
  </div>`;
}


function eqMultiply(id){

  let a=rand(2,20);
  let x=rand(2,15);
  let b=a*x;

  answers[id]=x;

  return `
  ${a} · x = ${b}
  <div class="answer">
    x = ? <br>
    <input id="${id}" type="number">
  </div>`;
}


/* Okrugli brojevi */

function eqRound(id){

  let a=[20,30,40,50,100,200,300][rand(0,6)];
  let x=rand(2,10);
  let b=a*x;

  answers[id]=x;

  return `
  ${a} · x = ${b}
  <div class="answer">
    x = ? <br>
    <input id="${id}" type="number">
  </div>`;
}


/* =========================
   TEKSTUALNI ZADACI
========================= */

function wordPrice(id){

  let name=randomName();

  let qty=rand(3,8);
  let price=rand(5,15);

  let total=qty*price;

  let money=rand(40,80);

  let result=Math.floor(money/price);

  answers[id]=result;

  return `
  ${name} köpte ${qty} glassar för ${total} kr.
  Hur många glassar kan han köpa för ${money} kr?

  <div class="answer">
    Svar: <input id="${id}" type="number">
  </div>`;
}


function wordDifference(id){

  let n1=randomName();
  let n2=randomName();

  let p1=rand(120,200);
  let p2=rand(100,180);

  let diff=Math.abs(p1-p2);

  answers[id]=diff;

  return `
  ${n1} köpte en tårta för ${p1} kr och
  ${n2} betalade ${p2} kr.
  Hur mycket dyrare var den första?

  <div class="answer">
    Svar: <input id="${id}" type="number">
  </div>`;
}


/* =========================
   RANDOM ZADATAK
========================= */

function randomTask(id){

  let t=rand(1,5);

  if(t===1) return eqDivide1(id);
  if(t===2) return eqDivide2(id);
  if(t===3) return eqMultiply(id);
  if(t===4) return eqRound(id);

  return wordDifference(id);
}


/* =========================
   GENERISI TEST
========================= */

function generateTest(){

  answers={};

  let html="";

  for(let q=1;q<=6;q++){

    html+=`
    <div class="task">
      <div class="number">${q}.</div>

      <div class="sub">a) ${randomTask("q"+q+"a")}</div>
      <div class="sub">b) ${randomTask("q"+q+"b")}</div>
      <div class="sub">c) ${randomTask("q"+q+"c")}</div>
    </div>`;
  }

  document.getElementById("questions").innerHTML=html;
}


/* =========================
   NAVIGACIJA
========================= */

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startTest(){
  generateTest();
  showPage("page2");
}

function showTest(){ showPage("page2"); }

function newTest(){
  document.getElementById("testForm").reset();
  showPage("page1");
}


/* =========================
   OCENJIVANJE
========================= */

function finishTest(){

  let score=0;

  for(let id in answers){

    let value=document.getElementById(id).value;

    if(value==="") continue;

    if(Number(value)===answers[id]) score++;
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
