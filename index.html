<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteprov</title>

<style>
body{font-family:Arial;text-align:center;padding:15px;}
.page{display:none;}
.active{display:block;}

input{
  width:90px;
  padding:6px;
  margin:6px;
  font-size:18px;
  text-align:center;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="page1" class="page active">

<h1>Matteprov</h1>
<button onclick="startTest()">Starta test</button>

</div>


<!-- TEST -->
<div id="page2" class="page">

<h2>Test</h2>

<form id="testForm">
<div id="questions"></div>
</form>

<button onclick="finishTest()">Avsluta test</button>

</div>


<!-- RESULTAT -->
<div id="page3" class="page">

<h2>Resultat</h2>
<h1 id="score"></h1>

<button onclick="showTest()">Rätta test</button>
<button onclick="newTest()">Nytt test</button>

</div>



<script>

/* =========================
   GLOBALNO
========================= */

let answers = {};

const names = [
"Stefan","Axmer","Filip","Vasko",
"Tadija","Tore","Tobias","Noah"
];

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function randomName(){
  return names[rand(0,names.length-1)];
}


/* =========================
   TIPOVI ZADATAKA
========================= */


/* x / a = b */
function eqDivide1(id){

  let a = rand(2,10);
  let b = rand(2,10);

  let x = a*b;

  answers[id]=x;

  return b + " = x / " + a +
  " → x = <input id='"+id+"' type='number'>";
}


/* b = c / x */
function eqDivide2(id){

  let x = rand(2,10);
  let b = rand(2,10);

  let c = b*x;

  answers[id]=x;

  return b + " = " + c + " / x → x = <input id='"+id+"' type='number'>";
}


/* a · x = b */
function eqMultiply(id){

  let a = rand(2,20);
  let x = rand(2,20);

  let b = a*x;

  answers[id]=x;

  return a + " · x = " + b +
  " → x = <input id='"+id+"' type='number'>";
}


/* x · a = b */
function eqMultiply2(id){

  let a = rand(10,50);
  let x = rand(2,10);

  let b = a*x;

  answers[id]=x;

  return "x · " + a + " = " + b +
  " → x = <input id='"+id+"' type='number'>";
}


/* Okrugli veliki brojevi */
function eqRound(id){

  let a = [20,30,40,50,100,200,300][rand(0,6)];
  let x = rand(2,10);

  let b = a*x;

  answers[id]=x;

  return a + " · x = " + b +
  " → x = <input id='"+id+"' type='number'>";
}


/* Tekstualni zadatak — cena */
function wordPrice(id){

  let name = randomName();

  let qty = rand(3,8);
  let pricePer = rand(5,15);

  let total = qty * pricePer;

  let money = rand(40,80);

  let result = Math.floor(money / pricePer);

  answers[id]=result;

  return name + " köpte " + qty +
  " glassar för " + total +
  " kr. Hur många glassar kan han köpa för " +
  money + " kr? <input id='"+id+"' type='number'>";
}


/* Tekstualni — razlika cena */
function wordDifference(id){

  let n1 = randomName();
  let n2 = randomName();

  let p1 = rand(120,200);
  let p2 = rand(100,180);

  let diff = Math.abs(p1-p2);

  answers[id]=diff;

  return n1 + " köpte en tårta för " +
  p1 + " kr och " + n2 +
  " betalade " + p2 +
  " kr. Hur mycket dyrare var den första? <input id='"+id+"' type='number'>";
}


/* =========================
   RANDOM IZBOR ZADATKA
========================= */

function randomTask(id){

  let type = rand(1,7);

  if(type===1) return eqDivide1(id);
  if(type===2) return eqDivide2(id);
  if(type===3) return eqMultiply(id);
  if(type===4) return eqMultiply2(id);
  if(type===5) return eqRound(id);
  if(type===6) return wordPrice(id);

  return wordDifference(id);
}


/* =========================
   GENERISI TEST
========================= */

function generateTest(){

  answers = {};
  let html="";

  for(let q=1;q<=6;q++){

    html += "<p>" + q + ")<br>";

    html += "a) " + randomTask("q"+q+"a") + "<br>";
    html += "b) " + randomTask("q"+q+"b") + "<br>";
    html += "c) " + randomTask("q"+q+"c");

    html += "</p>";
  }

  document.getElementById("questions").innerHTML = html;
}


/* =========================
   NAVIGACIJA
========================= */

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

function startTest(){
  generateTest();
  showPage("page2");
}

function showTest(){
  showPage("page2");
}

function newTest(){
  document.getElementById("testForm").reset();
  showPage("page1");
}


/* =========================
   OCENJIVANJE
========================= */

function finishTest(){

  let score = 0;

  for(let id in answers){

    let value = document.getElementById(id).value;

    if(value==="") continue;

    if(Number(value)===answers[id]) score++;
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
