<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matteprov</title>
<style>
body{
  background:#cfe8ff;
  font-family:Arial;
  margin:0;
}

/* STRANICE */
.page{
  display:none;
  min-height:100vh;
  width:100%;
  padding:20px;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  
  transform: scale(0.9);  /* 0.9 = 90% veličine, možete smanjiti ili povećati */
  transform-origin: top center; /* zoom oko vrha ekrana */
}

.active{
  display:flex;
}

.center{text-align:center;}

/* BLOK TESTA */
#questions{
  max-width:760px;
  margin:0 auto;
}

/* ZADATAK */
.task{
  margin-bottom:60px;
  font-size:18px;
}

.wrong{
  background:#ffd6d6; /* blago crveno */
}

/* REDNI BROJ */
.number{
  font-weight:bold;
  font-size:28px;
  margin-right:10px;
}

/* PODZADATAK RED */
.sub{
  margin-left:40px;
  margin-bottom:20px;
  display:flex;
  align-items:flex-start; /* poravnanje po top */
  gap:10px;
}

/* OZNAKA a) b) c) */
.label{
  width:32px;
  font-weight:bold;
}

/* TEKST */
.text{
  flex:1;
}

/* ODGOVOR ISTI RED */
.inlineAnswer{
  margin-left:20px;
  margin-top:0;
  flex-shrink:0;
}

/* UŽI INPUT */
.smallInput{
  width:70px;
  padding:6px;
  font-size:18px;
  text-align:center;
}

/* VEĆI INPUT */
.bigInput{
  width:120px;
  padding:7px;
  font-size:18px;
  text-align:center;
}

/* PRAVI RAZLOMAK */
.frac{
  display:inline-block;
  text-align:center;
  vertical-align:middle;
  margin:0 5px;
}
.frac .top{
  display:block;
  border-bottom:2px solid black;
}
.frac .bottom{
  display:block;
}

/* Dugmad */
button{
  margin:20px;
  padding:12px 25px;
  font-size:18px;
}
</style>
</head>
<body>

<!-- STRANA 1 -->
<div id="page1" class="page active center">
  <h1>Matteprov</h1>
  <button onclick="goToPage(2)">Starta test</button>
</div>

<!-- STRANA 2 -->
<div id="page2" class="page">
  <h2 style="text-align:center">Test</h2>
  <form id="testForm">
    <div id="questions"></div>
  </form>
  <div style="text-align:center">
    <button onclick="finishTest()">Avsluta test</button>
  </div>
</div>

<!-- STRANA 3 -->
<div id="page3" class="page center">
  <h2>Resultat</h2>
  <h1 id="score"></h1>
  <button onclick="correctTest()">Rätta test</button>
  <button onclick="newTest()">Nytt test</button>
</div>

<script>
// GLOBALNO
let correctionMode = false;
let answers = {};
const names = ["Stefan","Axmer","Filip","Vasko","Tadija","Tore","Tobias","Noah"];

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function randomName(){ return names[rand(0,names.length-1)]; }

// PRAVI RAZLOMAK
function frac(top,bottom){
  return `<span class="frac"><span class="top">${top}</span><span class="bottom">${bottom}</span></span>`;
}

function markAnswers(){

  for(let id in answers){

    let input = document.getElementById(id);
    let value = input.value;

    if(value==="" || Number(value)!==answers[id]){

      // NETACNO
      input.classList.add("wrong");
      input.disabled = false;

    }else{

      // TACNO
      input.classList.remove("wrong");
      input.disabled = true;

    }
  }
}

function newTest(){
  correctionMode = false;
  goToPage(1);
}

function correctTest(){

  correctionMode = true;

  goToPage(2);

  // označi tačne i netačne odgovore
  setTimeout(markAnswers, 50);
}

// JEDNACINE
function eqDivide1(id){ 
  let a=rand(2,10); let b=rand(2,10); let x=a*b; answers[id]=x;
  return `${b} = x / ${a} <span class="inlineAnswer">x = <input class="smallInput" id="${id}" type="number"></span>`;
}

function eqDivide2(id){
  let x=rand(2,10); let b=rand(2,10); let c=b*x; answers[id]=x;
  return `${b} = ${frac(c,"x")} <span class="inlineAnswer">x = <input class="smallInput" id="${id}" type="number"></span>`;
}

function eqMultiply(id){
  let a=rand(2,20); let x=rand(2,15); let b=a*x; answers[id]=x;
  return `${a} · x = ${b} <span class="inlineAnswer">x = <input class="smallInput" id="${id}" type="number"></span>`;
}

// TEKSTUALNI ZADACI
function wordDifference(id){
  let n1=randomName(), n2=randomName();
  let p1=rand(120,200), p2=rand(100,180);
  let diff=Math.abs(p1-p2); answers[id]=diff;
  return `${n1} köpte en tårta för ${p1} kr och ${n2} betalade ${p2} kr. Hur mycket dyrare var den första? <span class="inlineAnswer">Svar: <input class="bigInput" id="${id}" type="number"></span>`;
}

// RANDOM ZADATAK
function randomTask(id){
  let t=rand(1,4);
  if(t===1) return eqDivide1(id);
  if(t===2) return eqDivide2(id);
  if(t===3) return eqMultiply(id);
  return wordDifference(id);
}

// GENERISI TEST
function generateTest(){
  answers={};
  let html="";
  for(let q=1;q<=6;q++){
    html+=`
      <div class="task">
        <div class="sub"><span class="number">${q}.</span><span class="label">a)</span><div class="text">${randomTask("q"+q+"a")}</div></div>
        <div class="sub"><span class="number" style="visibility:hidden">${q}.</span><span class="label">b)</span><div class="text">${randomTask("q"+q+"b")}</div></div>
        <div class="sub"><span class="number" style="visibility:hidden">${q}.</span><span class="label">c)</span><div class="text">${randomTask("q"+q+"c")}</div></div>
      </div>`;
  }
  document.getElementById("questions").innerHTML=html;
}

// PRELAZ IZMEDJU STRANICA
function goToPage(n){

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");

  if(n===2 && !correctionMode){
    generateTest(); // samo ako NIJE ispravka
  }
}

// OCJENJIVANJE
function finishTest() {
  let score = 0;

  for (let id in answers) {
    let value = document.getElementById(id).value;
    if (value === "") continue;
    if (Number(value) === answers[id]) score++;
  }

  document.getElementById("score").innerText = score + " / 18 poäng";

  // POZIV MAILA - šalje cijeli HTML test
  sendEmail(score);

  // Prikazi rezultat
  goToPage(3);
}

function buildReport(score) {
  let report = `<h2>Matteprov resultat: ${score} / 18 poäng</h2>`;

  for (let id in answers) {
    let input = document.getElementById(id);
    let value = input.value;
    let correct = answers[id];
    let text = input.closest(".text").innerText; // tekst zadatka

    if (Number(value) === correct) {
      report += `<p>${text} → ${value}</p>`; // tačno
      input.disabled = true; // blokira textbox
    } else {
      report += `<p style="color:red">${text} → ${value || "(tomt)"}</p>`; // netačno
      input.style.backgroundColor = "#ffd6d6"; // blago crveno
      input.disabled = false;
    }
  }

  return report;
}

function buildTextReport(score) {
  let report = `Matteprov resultat: ${score} / 18 poäng\n\n\n`;

  for (let id in answers) {
    let input = document.getElementById(id);
    let value = input.value || "(tomt)";
    let correct = answers[id];
    let text = input.closest(".text").innerText;

    if (Number(value) === correct) {
      report += `✅    ${text}   →   ${value}\n\n`; // tačno
    } else {
      report += `❌    ${text}   →   ${value}\n\n`; // netačno
    }
  }

  return report;
}

function sendEmail(score){
  let messageText = buildTextReport(score); // HTML generisan u Koraku 2
alert(messageText); 
  emailjs.send("service_tiyv9xj", "template_ak5fq6p", {
    name: "Stefan",          // ime djeteta
    time: new Date().toLocaleString(),
    message: messageText    // <-- OVDJE IDE HTML KOJI POPUNJAVA {{message}}
  })
  .then(function(response){
    console.log("Mail poslan!", response.status, response.text);
  }, function(error){
    console.log("Greška pri slanju maila", error);
  });
}

</script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("gsyDwBHczXqLmprzw");
})();
</script>
</body>
</html>
