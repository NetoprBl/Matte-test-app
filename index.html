<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteprov</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding:15px;
}

.page{ display:none; }
.active{ display:block; }

input{
  width:80px;
  padding:6px;
  margin:4px;
  font-size:18px;
  text-align:center;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin:10px;
}
</style>
</head>

<body>

<!-- STRANA 1 -->
<div id="page1" class="page active">

<h1>Matteprov</h1>
<button onclick="startTest()">Starta test</button>

</div>


<!-- STRANA 2 -->
<div id="page2" class="page">

<h2>Test</h2>

<form id="testForm">
<div id="questions"></div>
</form>

<button onclick="finishTest()">Avsluta test</button>

</div>


<!-- STRANA 3 -->
<div id="page3" class="page">

<h2>Resultat</h2>
<h1 id="score"></h1>

<button onclick="showTest()">Rätta test</button>
<button onclick="newTest()">Nytt test</button>

</div>


<script>

/* =========================
   GLOBALNE PROMENLJIVE
========================= */

let answers = {};


/* =========================
   GENERATOR ZADATAKA
========================= */

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}


/* Generise jedan podzadatak */
function generateTask(id){

  let type = rand(1,4);

  let a,b,text,correct;

  if(type===1){ // sabiranje
    a=rand(1,20);
    b=rand(1,20);
    text = a + " + " + b + " = ";
    correct = a+b;
  }

  else if(type===2){ // oduzimanje
    a=rand(10,30);
    b=rand(1,10);
    text = a + " − " + b + " = ";
    correct = a-b;
  }

  else if(type===3){ // mnozenje
    a=rand(2,10);
    b=rand(2,10);
    text = a + " × " + b + " = ";
    correct = a*b;
  }

  else{ // deljenje
    b=rand(2,10);
    correct=rand(2,10);
    a=b*correct;
    text = a + " / " + b + " = ";
  }

  answers[id] = correct;

  return text + '<input id="'+id+'" type="number">';
}


/* Generise ceo test */
function generateTest(){

  answers = {};

  let html="";

  for(let q=1;q<=6;q++){

    html += "<p>" + q + ") ";

    html += "a) " + generateTask("q"+q+"a") + "<br>";
    html += "b) " + generateTask("q"+q+"b") + "<br>";
    html += "c) " + generateTask("q"+q+"c");

    html += "</p>";
  }

  document.getElementById("questions").innerHTML = html;
}


/* =========================
   NAVIGACIJA
========================= */

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

function startTest(){
  generateTest();
  showPage("page2");
}

function showTest(){
  showPage("page2");
}

function newTest(){
  document.getElementById("testForm").reset();
  showPage("page1");
}


/* =========================
   OCENJIVANJE
========================= */

function finishTest(){

  let score=0;

  for(let id in answers){

    let value=document.getElementById(id).value;

    if(value==="") continue;

    if(Number(value)===answers[id]) score++;
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
