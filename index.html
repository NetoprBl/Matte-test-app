<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteövning</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding:15px;
}

.page{display:none;}
.active{display:block;}

input{
  width:90px;
  padding:6px;
  margin:6px;
  font-size:18px;
  text-align:center;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin:10px;
}
</style>
</head>

<body>

<!-- STRANA 1 -->
<div id="page1" class="page active">

<h1>Matteövning</h1>

<p>Välj nivå:</p>

<select id="level">
  <option value="4">Årskurs 4</option>
  <option value="5">Årskurs 5</option>
  <option value="6">Årskurs 6</option>
</select>

<br><br>

<button onclick="startTest()">Starta test</button>

</div>


<!-- STRANA 2 -->
<div id="page2" class="page">

<h2>Test</h2>

<form id="testForm">
<div id="questions"></div>
</form>

<button onclick="finishTest()">Avsluta test</button>

</div>


<!-- STRANA 3 -->
<div id="page3" class="page">

<h2>Resultat</h2>
<h1 id="score"></h1>

<button onclick="showTest()">Rätta test</button>
<button onclick="newTest()">Nytt test</button>

</div>


<script>

/* =========================
   GLOBALNO
========================= */

let answers = {};
let level = 4;

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}


/* =========================
   GENERATOR ZADATAKA
========================= */

function taskArithmetic(id){

  let a = rand(1,50);
  let b = rand(1,50);

  answers[id]=a+b;

  return a + " + " + b + " = <input id='"+id+"' type='number'>";
}


function taskMultiply(id){

  let a = rand(2,10);
  let b = rand(2,10);

  answers[id]=a*b;

  return a + " × " + b + " = <input id='"+id+"' type='number'>";
}


function taskEquation(id){

  let x = rand(2,10);
  let d = rand(2,10);

  let left = x/d;

  answers[id]=x;

  return left + " = x / " + d + " → x = <input id='"+id+"' type='number'>";
}


function taskWord(id){

  let apples = rand(5,20);
  let eat = rand(1,apples-1);

  answers[id]=apples-eat;

  return "Anna har " + apples +
  " äpplen. Hon äter " + eat +
  ". Hur många är kvar? <input id='"+id+"' type='number'>";
}


/* =========================
   GENERISI CEO TEST
========================= */

function generateTest(){

  answers={};

  let html="";

  for(let q=1;q<=6;q++){

    html += "<p>" + q + ")<br>";

    html += "a) " + taskArithmetic("q"+q+"a") + "<br>";
    html += "b) " + taskMultiply("q"+q+"b") + "<br>";
    html += "c) " + taskWord("q"+q+"c");

    html += "</p>";
  }

  document.getElementById("questions").innerHTML = html;
}


/* =========================
   NAVIGACIJA
========================= */

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}

function startTest(){

  level = document.getElementById("level").value;

  generateTest();

  showPage("page2");
}

function showTest(){
  showPage("page2");
}

function newTest(){
  document.getElementById("testForm").reset();
  showPage("page1");
}


/* =========================
   OCENJIVANJE
========================= */

function finishTest(){

  let score=0;

  for(let id in answers){

    let value=document.getElementById(id).value;

    if(value==="") continue;

    if(Number(value)===answers[id]) score++;
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
