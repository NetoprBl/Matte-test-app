<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteprov</title>

<style>
/* Jednostavan izgled za telefon */

body{
  font-family: Arial;
  text-align: center;
  padding: 15px;
}

.page{
  display:none;
}

.active{
  display:block;
}

input{
  width:80px;
  padding:6px;
  margin:4px;
  font-size:18px;
  text-align:center;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin:10px;
}
</style>
</head>

<body>

<!-- =========================
     STRANA 1 — START
========================= -->
<div id="page1" class="page active">

<h1>Matteprov</h1>

<button onclick="startTest()">Starta test</button>

</div>


<!-- =========================
     STRANA 2 — TEST
========================= -->
<div id="page2" class="page">

<h2>Test</h2>

<form id="testForm">

<!-- 6 zadataka x 3 potpitanja -->

<p>1) a) 6 = x / 4 → x =
<input id="q1a" type="number">

b) 5 + 3 =
<input id="q1b" type="number">

c) 12 − 7 =
<input id="q1c" type="number"></p>


<p>2) a) 3 × 4 =
<input id="q2a" type="number">

b) 20 / 5 =
<input id="q2b" type="number">

c) 9 + 8 =
<input id="q2c" type="number"></p>


<p>3) a) 15 − 6 =
<input id="q3a" type="number">

b) 2 × 9 =
<input id="q3b" type="number">

c) 16 / 2 =
<input id="q3c" type="number"></p>


<p>4) a) 7 + 5 =
<input id="q4a" type="number">

b) 30 / 6 =
<input id="q4b" type="number">

c) 10 − 3 =
<input id="q4c" type="number"></p>


<p>5) a) 8 × 3 =
<input id="q5a" type="number">

b) 18 / 3 =
<input id="q5b" type="number">

c) 11 + 6 =
<input id="q5c" type="number"></p>


<p>6) a) 14 − 9 =
<input id="q6a" type="number">

b) 5 × 5 =
<input id="q6b" type="number">

c) 21 / 7 =
<input id="q6c" type="number"></p>

</form>

<button onclick="finishTest()">Avsluta test</button>

</div>


<!-- =========================
     STRANA 3 — REZULTAT
========================= -->
<div id="page3" class="page">

<h2>Resultat</h2>

<h1 id="score"></h1>

<button onclick="showTest()">Rätta test</button>
<button onclick="newTest()">Nytt test</button>

</div>



<script>

/* =========================
   Funkcije za menjanje strana
========================= */

function startTest(){
  showPage("page2");
}

function showTest(){
  showPage("page2");
}

function newTest(){

  // Reset svih polja
  document.getElementById("testForm").reset();

  showPage("page1");
}

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
}


/* =========================
   Tacni odgovori
========================= */

const answers = {

  q1a:24, q1b:8, q1c:5,
  q2a:12, q2b:4, q2c:17,
  q3a:9,  q3b:18, q3c:8,
  q4a:12, q4b:5,  q4c:7,
  q5a:24, q5b:6,  q5c:17,
  q6a:5,  q6b:25, q6c:3

};


/* =========================
   Zavrsavanje testa
========================= */

function finishTest(){

  let score = 0;

  for(let id in answers){

    let value = document.getElementById(id).value;

    // Ako nije popunjeno → 0 bodova
    if(value === "") continue;

    if(Number(value) === answers[id]){
      score++;
    }
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
