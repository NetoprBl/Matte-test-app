<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matteprov</title>

<style>

/* POZADINA */
body{
  background:#cfe8ff;
  font-family:Arial;
  margin:0;
}

/* STRANICE */
.page{
  display:none;
  min-height:100vh;
}

.active{display:flex;}

/* CENTRIRANJE STRANA 1 i 3 */
.center{
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TEST STRANA */
.testPage{
  display:block;
  padding:20px;
}

/* BLOK TESTA */
#questions{
  max-width:750px;
  margin:0 auto;
}

/* ZADATAK */
.task{
  margin-bottom:35px;
  font-size:18px;
}

/* REDNI BROJ */
.number{
  font-weight:bold;
  font-size:28px;
  display:inline-block;
  margin-right:10px;
}

/* PODZADATAK RED */
.sub{
  margin-left:40px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
}

/* a) b) c) */
.label{
  width:32px;
  font-weight:bold;
}

/* TEKST ZADATKA */
.text{
  margin-left:10px;
  flex:1;
}

/* ODGOVOR ISTI RED */
.inlineAnswer{
  margin-left:40px;
}

/* UZI TEXTBOX */
.smallInput{
  width:70px; /* oko 4 cifre */
  padding:6px;
  font-size:18px;
  text-align:center;
}

/* VEĆI TEXTBOX za tekstualne */
.bigInput{
  width:120px;
  padding:7px;
  font-size:18px;
  text-align:center;
}

/* Dugmad */
button{
  margin:20px;
  padding:12px 25px;
  font-size:18px;
}

</style>
</head>

<body>

<!-- STRANA 1 -->
<div id="page1" class="page active center">
  <h1>Matteprov</h1>
  <button onclick="startTest()">Starta test</button>
</div>


<!-- STRANA 2 -->
<div id="page2" class="page testPage">
  <h2 style="text-align:center">Test</h2>

  <form id="testForm">
    <div id="questions"></div>
  </form>

  <div style="text-align:center">
    <button onclick="finishTest()">Avsluta test</button>
  </div>
</div>


<!-- STRANA 3 -->
<div id="page3" class="page center">
  <h2>Resultat</h2>
  <h1 id="score"></h1>

  <button onclick="showTest()">Rätta test</button>
  <button onclick="newTest()">Nytt test</button>
</div>



<script>

/* GLOBALNO */

let answers = {};

const names = [
"Stefan","Axmer","Filip","Vasko",
"Tadija","Tore","Tobias","Noah"
];

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function randomName(){
  return names[rand(0,names.length-1)];
}


/* ======= ZADACI ======= */

/* b = x / a */
function eqDivide1(id){

  let a=rand(2,10);
  let b=rand(2,10);
  let x=a*b;

  answers[id]=x;

  return `
    ${b} = x / ${a}
    <span class="inlineAnswer">
      x = <input class="smallInput" id="${id}" type="number">
    </span>`;
}


/* b = c / x  → razlomak */
function eqDivide2(id){

  let x=rand(2,10);
  let b=rand(2,10);
  let c=b*x;

  answers[id]=x;

  return `
    ${b} = ${c} / x
    <span class="inlineAnswer">
      x = <input class="smallInput" id="${id}" type="number">
    </span>`;
}


/* a · x = b */
function eqMultiply(id){

  let a=rand(2,20);
  let x=rand(2,15);
  let b=a*x;

  answers[id]=x;

  return `
    ${a} · x = ${b}
    <span class="inlineAnswer">
      x = <input class="smallInput" id="${id}" type="number">
    </span>`;
}


/* TEKSTUALNI */
function wordDifference(id){

  let n1=randomName();
  let n2=randomName();

  let p1=rand(120,200);
  let p2=rand(100,180);

  let diff=Math.abs(p1-p2);

  answers[id]=diff;

  return `
    ${n1} köpte en tårta för ${p1} kr och
    ${n2} betalade ${p2} kr.
    Hur mycket dyrare var den första?
    <br><br>
    Svar: <input class="bigInput" id="${id}" type="number">`;
}


/* RANDOM */
function randomTask(id){

  let t=rand(1,4);

  if(t===1) return eqDivide1(id);
  if(t===2) return eqDivide2(id);
  if(t===3) return eqMultiply(id);

  return wordDifference(id);
}


/* GENERISI TEST */

function generateTest(){

  answers={};

  let html="";

  for(let q=1;q<=6;q++){

    html+=`
      <div class="task">

        <div class="sub">
          <span class="number">${q}.</span>
          <span class="label">a)</span>
          <div class="text">${randomTask("q"+q+"a")}</div>
        </div>

        <div class="sub">
          <span class="number" style="visibility:hidden">${q}.</span>
          <span class="label">b)</span>
          <div class="text">${randomTask("q"+q+"b")}</div>
        </div>

        <div class="sub">
          <span class="number" style="visibility:hidden">${q}.</span>
          <span class="label">c)</span>
          <div class="text">${randomTask("q"+q+"c")}</div>
        </div>

      </div>`;
  }

  document.getElementById("questions").innerHTML=html;
}


/* NAVIGACIJA */

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startTest(){
  generateTest();
  showPage("page2");
}

function showTest(){ showPage("page2"); }

function newTest(){
  document.getElementById("testForm").reset();
  showPage("page1");
}


/* OCENJIVANJE */

function finishTest(){

  let score=0;

  for(let id in answers){

    let value=document.getElementById(id).value;

    if(value==="") continue;

    if(Number(value)===answers[id]) score++;
  }

  document.getElementById("score").innerText =
    score + " / 18 poäng";

  showPage("page3");
}

</script>

</body>
</html>
